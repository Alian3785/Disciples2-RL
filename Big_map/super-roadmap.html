<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disciples 2 RL Roadmap</title>
  <style>
    :root {
      --panel: #ffffff;
      --line: #dbe4ef;
      --line-strong: #c7d4e4;
      --text: #21374d;
      --muted: #4f6881;
      --unit: 16px;
      --cols: 180;
      --row-h: 42px;
      --cal-h: 24px;
      --shadow: 0 10px 30px rgba(30, 56, 89, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(150deg, #eff5fc, #e4edf8);
      font-family: "Segoe UI", "Trebuchet MS", "Verdana", sans-serif;
      color: var(--text);
    }

    .page {
      position: relative;
      padding: 0 16px 16px;
    }

    .corner-panel {
      position: fixed;
      right: 12px;
      top: 72px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border: 1px solid #c9d7e7;
      border-radius: 999px;
      background: #f7fbff;
      box-shadow: 0 4px 12px rgba(30, 56, 89, 0.08);
      cursor: grab;
      user-select: none;
    }

    .corner-panel.dragging {
      cursor: grabbing;
    }

    .corner-title {
      margin: 0 3px 0 2px;
      font-size: 0.76rem;
      color: #32506d;
      font-weight: 700;
      white-space: nowrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #c9d7e7;
      background: #f7fbff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      color: #38506a;
    }

    .chip-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2a9ded;
    }

    .progress {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #c9d7e7;
      background: #f7fbff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
    }

    .track {
      width: 130px;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #dce7f2;
    }

    .fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #2bc1ff, #30d18d, #f86666);
      transition: width 0.2s ease;
    }

    .pager {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #c9d7e7;
      background: #f7fbff;
      border-radius: 999px;
      padding: 2px;
    }

    .pager-label {
      font-size: 0.72rem;
      color: #35516d;
      min-width: 78px;
      text-align: center;
      padding: 0 2px;
      font-weight: 600;
    }

    .btn {
      border: 1px solid #b7cadd;
      background: #f7fbff;
      color: #26415b;
      border-radius: 999px;
      padding: 4px 9px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.72rem;
    }

    .zoom {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #c9d7e7;
      background: #f7fbff;
      border-radius: 999px;
      padding: 2px;
    }

    .zoom-label {
      font-size: 0.72rem;
      color: #35516d;
      min-width: 72px;
      text-align: center;
      padding: 0 2px;
      font-weight: 600;
    }

    .btn:hover {
      background: #edf5fd;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .frame {
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--panel);
    }

    .scroll {
      overflow: auto;
      height: calc(100vh - 18px);
    }

    .roadmap {
      width: max(100%, calc(var(--cols) * var(--unit)));
      min-width: 100%;
    }

    .calendar-row {
      display: grid;
      grid-template-columns: calc(var(--cols) * var(--unit));
      min-height: var(--cal-h);
      border-bottom: 1px solid var(--line-strong);
    }

    .cal-track {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--unit));
      width: calc(var(--cols) * var(--unit));
      min-height: var(--cal-h);
    }

    .month-cell {
      border-right: 1px solid #c4d2e2;
      background: #e5f1fc;
      color: #355473;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      padding-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chunk-cell {
      border-right: 1px solid #d2dde9;
      text-align: center;
      font-size: 0.58rem;
      color: #435f7a;
      background: #f3f8fd;
      padding-top: 4px;
    }

    .chunk-cell.long {
      background: #eef5fc;
    }

    .chunk-cell.today-marker {
      background: #ef5b5b;
      color: #ffffff;
      font-weight: 700;
    }

    .chunk-cell.remaining-marker {
      background: #ffe67a;
      color: #3b3200;
      font-weight: 700;
    }

    .chunk-cell.today-marker.remaining-marker {
      background: #ef5b5b;
      color: #ffffff;
    }

    .rows {
      position: relative;
      min-height: calc(100vh - 130px);
      background:
        radial-gradient(1200px 420px at 12% -8%, rgba(70, 137, 204, 0.16), transparent 62%),
        radial-gradient(900px 360px at 88% 112%, rgba(55, 176, 140, 0.14), transparent 60%),
        radial-gradient(700px 300px at 50% 42%, rgba(151, 191, 231, 0.10), transparent 66%),
        linear-gradient(155deg, #fafdff 0%, #f1f7fe 48%, #e9f2fb 100%);
    }

    .links {
      position: absolute;
      left: 0;
      top: 0;
      width: calc(var(--cols) * var(--unit));
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: visible;
    }

    .dep-link {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0.85;
    }

    .row {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: calc(var(--cols) * var(--unit));
      min-height: var(--row-h);
      border-bottom: 0;
    }

    .lane {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--unit));
      width: calc(var(--cols) * var(--unit));
      min-height: var(--row-h);
      background: transparent;
    }

    .bar {
      align-self: center;
      height: 28px;
      border-radius: 999px;
      border-right: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.15);
      cursor: grab;
      transition: transform 0.12s ease, filter 0.12s ease;
      touch-action: none;
      display: flex;
      align-items: center;
      padding: 0 12px;
      color: #111111;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
    }

    .bar:hover {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }

    .bar.main {
      height: 32px;
      border-radius: 6px;
      cursor: default;
      font-size: 0.82rem;
    }

    .bar-handle {
      position: absolute;
      top: 0;
      width: 10px;
      height: 100%;
      background: rgba(0, 0, 0, 0.18);
      cursor: ew-resize;
      opacity: 0;
      transition: opacity 0.12s ease;
    }

    .bar:hover .bar-handle {
      opacity: 0.9;
    }

    .bar-handle.left {
      left: 0;
      border-top-left-radius: inherit;
      border-bottom-left-radius: inherit;
    }

    .bar-handle.right {
      right: 0;
      border-top-right-radius: inherit;
      border-bottom-right-radius: inherit;
    }

    .bar.done {
      filter: saturate(0.2) brightness(1.1);
    }

    .bar.dragging {
      cursor: grabbing;
      transform: translateY(-1px);
      filter: brightness(1.12);
    }

    .note-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
      padding: 16px;
      background: rgba(17, 33, 52, 0.42);
    }

    .note-modal.open {
      display: flex;
    }

    .note-card {
      width: min(700px, 100%);
      border-radius: 14px;
      border: 1px solid #c8d6e5;
      background: #f9fcff;
      box-shadow: 0 18px 44px rgba(20, 44, 72, 0.22);
      padding: 14px;
    }

    .note-head {
      font-size: 0.84rem;
      color: #24425f;
      font-weight: 700;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .note-input {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid #b9c9db;
      background: #ffffff;
      color: #0f2438;
      padding: 10px;
      font: 500 0.84rem/1.4 "Segoe UI", "Trebuchet MS", "Verdana", sans-serif;
      outline: none;
    }

    .note-input:focus {
      border-color: #4a8fcd;
      box-shadow: 0 0 0 2px rgba(74, 143, 205, 0.2);
    }

    .note-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    @media (max-width: 900px) {
      :root {
        --unit: 13px;
      }

      .corner-panel {
        right: 8px;
        top: 62px;
      }

      .corner-title {
        display: none;
      }

      .pager-label {
        min-width: 70px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="corner-panel">
      <h1 class="corner-title">Roadmap</h1>
      <div class="pager">
        <button class="btn" id="prevBtn" type="button">Назад</button>
        <span class="pager-label" id="pagerLabel">Чарт 1 / 3</span>
        <button class="btn" id="nextBtn" type="button">Вперед</button>
      </div>
      <div class="zoom">
        <button class="btn" id="zoomOutBtn" type="button">-</button>
        <span class="zoom-label" id="zoomLabel">Шаг 3 дня</span>
        <button class="btn" id="zoomInBtn" type="button">+</button>
      </div>
    </div>

    <section class="frame">
      <div class="scroll">
        <div class="roadmap">
          <div class="calendar-row">
            <div class="cal-track" id="monthTrack"></div>
          </div>
          <div class="calendar-row">
            <div class="cal-track" id="chunkTrack"></div>
          </div>
          <div class="rows" id="rows">
            <svg class="links" id="links" aria-hidden="true"></svg>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="note-modal" id="noteModal" aria-hidden="true">
    <div class="note-card">
      <div class="note-head" id="noteModalTitle">Заметка</div>
      <textarea class="note-input" id="noteInput" placeholder="Введите текст..."></textarea>
      <div class="note-actions">
        <button class="btn" id="noteCancelBtn" type="button">Отмена</button>
        <button class="btn" id="noteSaveBtn" type="button">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    const groups = [
      {
        id: "1",
        title: "Главная линия 1: Игровое ядро Disciples 2",
        subtasks: [
          "Схема типов урона", "Матрица резистов", "Порядок инициативы", "Очередь ходов", "Логика ближнего удара",
          "Логика дальнего удара", "Логика заклинаний", "Баффы и дебаффы", "Эффекты контроля", "Критический удар",
          "Контратака", "Уклонение и промах", "Проверка иммунитетов и неуязвимости", "Смерть и удаление юнита", "Победа и поражение боя", "Генератор состава армии",
          "Расстановка на поле", "ИИ выбора цели", "ИИ приоритета навыков", "ИИ добивания", "Грид перемещения армии",
          "Стоимость перемещения", "Триггер вступления в бой", "Захват нейтральных точек", "Экран города", "Очередь строительства"
        ]
      },
      {
        id: "2",
        title: "Главная линия 2: RL среда и данные",
        subtasks: [
          "Пространство наблюдений", "Пространство действий", "Маска валидных действий", "Нормализация признаков", "Кодировщик карты",
          "Кодировщик армии", "Кодировщик города", "Сигнал награды за бой", "Штраф за пустой ход", "Награда за захват точки",
          "Награда за выполнение цели", "Эпизодный лимит шагов", "Reset сценария", "Случайная инициализация", "Curriculum миссий",
          "Логгер rollout", "Трекинг метрик побед", "Буфер replay диагностики", "Экспорт траекторий", "Валидационный seed набор",
          "Проверка детерминизма", "Тест совместимости SB3", "Тест совместимости MaskablePPO", "Профилирование step()", "Оптимизация расчета награды"
        ]
      },
      {
        id: "3",
        title: "Главная линия 3: Обучение и валидация агентов",
        subtasks: [
          "Baseline PPO run", "Baseline Maskable PPO run", "Sweep learning rate", "Sweep gamma", "Sweep clip range",
          "Sweep ent coef", "Sweep batch size", "Sweep n steps", "Sweep gae lambda", "Sweep vf coef",
          "Ранний stopping критерий", "Eval на fixed seeds", "Eval на unseen миссиях", "Анализ win rate", "Анализ длины эпизода",
          "Анализ награды", "Отладка деградации", "Модификация policy head", "Модификация value head", "Reward shaping v2",
          "Action masking rules v2", "Self play прототип", "Imitation pretrain", "Distillation в легкую сеть", "Ensemble проверка"
        ]
      }
    ];

    const MAX_SUBTASKS = 20;
    const FIRST_GROUP_SUBTASKS = 21;
    const DAY_MIN_SPAN = 2;
    const DAY_MAX_SPAN = 100000;
    const CHUNK_MIN_SPAN = 1;
    const CHUNK_MAX_SPAN = 100000;
    groups.forEach((group, groupIndex) => {
      const limit = groupIndex === 0 ? FIRST_GROUP_SUBTASKS : MAX_SUBTASKS;
      group.subtasks = group.subtasks.slice(0, limit);
    });

    const baseStartDate = new Date("2025-11-01T00:00:00");
    // 40 segments * 3 days = 120 days (about 4 months per chart)
    const segmentCount = 40;
    const segmentDays = 3;
    const chartSpanDays = segmentCount * segmentDays;
    const segments = [];
    const cumulativeDays = [];
    let totalDays = 0;
    let currentChartStartDate = new Date(baseStartDate);

    const monthTrack = document.getElementById("monthTrack");
    const chunkTrack = document.getElementById("chunkTrack");
    const rows = document.getElementById("rows");
    const links = document.getElementById("links");
    const scrollEl = document.querySelector(".scroll");
    const cornerPanel = document.querySelector(".corner-panel");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const clearBtn = document.getElementById("clearBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pagerLabel = document.getElementById("pagerLabel");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const zoomInBtn = document.getElementById("zoomInBtn");
    const zoomLabel = document.getElementById("zoomLabel");

    const posStorageBaseKey = "disciples_3x20_positions_v1";
    const pageStorageKey = "disciples_3x20_page_v1";
    const scaleStorageKey = "disciples_3x20_scale_v1";
    const notesStorageKey = "disciples_3x20_notes_v1";
    const firstGroupInsertMigrationKey = "disciples_migration_first_group_insert_after_12_v1";
    const spanHalvingMigrationKey = "disciples_migration_halve_spans_v1";
    const thirdChartLeftAlignMigrationKey = "disciples_migration_third_chart_left_align_v2";
    const noteModal = document.getElementById("noteModal");
    const noteModalTitle = document.getElementById("noteModalTitle");
    const noteInput = document.getElementById("noteInput");
    const noteSaveBtn = document.getElementById("noteSaveBtn");
    const noteCancelBtn = document.getElementById("noteCancelBtn");

    let currentGroupIndex = 0;
    let currentScale = "chunk";
    let items = {};
    let mainBar = null;
    let currentTaskIds = [];
    let dependencyPairs = [];
    let adjacency = {};
    let reverseAdjacency = {};
    let activeNoteId = null;
    let activeNoteLabel = "";

    const dragState = {
      active: false,
      id: null,
      pointerId: null,
      startX: 0,
      originStart: 0,
      minDelta: 0,
      maxDelta: 0,
      cascadeIds: [],
      baseStarts: {},
      moved: false
    };

    const resizeState = {
      active: false,
      id: null,
      pointerId: null,
      edge: null,
      startX: 0,
      minDelta: 0,
      maxDelta: 0,
      moved: false,
      baseStarts: {},
      baseSpan: 0,
      predecessors: [],
      descendants: []
    };

    const panelDragState = {
      active: false,
      pointerId: null,
      startX: 0,
      startY: 0,
      originLeft: 0,
      originTop: 0
    };

    function migrateFirstGroupInsertState(rawState) {
      if (!rawState || typeof rawState !== "object") return {};
      const migrated = {};
      for (const [key, value] of Object.entries(rawState)) {
        const match = key.match(/^1\.(\d{2})$/);
        if (!match) {
          migrated[key] = value;
          continue;
        }
        const index = Number(match[1]);
        if (!Number.isInteger(index) || index < 13) {
          migrated[key] = value;
          continue;
        }
        const nextKey = `1.${String(index + 1).padStart(2, "0")}`;
        if (!(nextKey in migrated)) {
          migrated[nextKey] = value;
        }
      }
      return migrated;
    }

    function runFirstGroupInsertMigration() {
      if (localStorage.getItem(firstGroupInsertMigrationKey) === "1") return;
      const storageKeys = [
        `${posStorageBaseKey}_chunk`,
        `${posStorageBaseKey}_day`,
        notesStorageKey
      ];
      for (const key of storageKeys) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) continue;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") continue;
          const migrated = migrateFirstGroupInsertState(parsed);
          localStorage.setItem(key, JSON.stringify(migrated));
        } catch {}
      }
      localStorage.setItem(firstGroupInsertMigrationKey, "1");
    }

    function migrateSpanHalvingState(rawState) {
      if (!rawState || typeof rawState !== "object") return {};
      const migrated = {};
      for (const [key, value] of Object.entries(rawState)) {
        if (value && typeof value === "object") {
          const next = { ...value };
          if (Number.isFinite(next.span)) {
            next.span = Math.max(1, Math.round(next.span / 2));
          }
          migrated[key] = next;
          continue;
        }
        migrated[key] = value;
      }
      return migrated;
    }

    function runSpanHalvingMigration() {
      if (localStorage.getItem(spanHalvingMigrationKey) === "1") return;
      const storageKeys = [
        `${posStorageBaseKey}_chunk`,
        `${posStorageBaseKey}_day`
      ];
      for (const key of storageKeys) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) continue;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") continue;
          const migrated = migrateSpanHalvingState(parsed);
          localStorage.setItem(key, JSON.stringify(migrated));
        } catch {}
      }
      localStorage.setItem(spanHalvingMigrationKey, "1");
    }

    function migrateThirdChartLeftState(rawState) {
      if (!rawState || typeof rawState !== "object") return {};
      const migrated = {};
      let minStart = Infinity;

      for (const [key, value] of Object.entries(rawState)) {
        migrated[key] = value;
        if (!/^3\.\d{2}$/.test(key)) continue;
        if (Number.isFinite(value)) {
          minStart = Math.min(minStart, value);
          continue;
        }
        if (!value || typeof value !== "object") continue;
        if (!Number.isFinite(value.start)) continue;
        minStart = Math.min(minStart, value.start);
      }

      if (!Number.isFinite(minStart)) return migrated;
      const shiftLeft = Math.max(0, minStart - 2);
      if (shiftLeft === 0) return migrated;

      for (const [key, value] of Object.entries(migrated)) {
        if (!/^3\.\d{2}$/.test(key)) continue;
        if (Number.isFinite(value)) {
          migrated[key] = Math.max(1, value - shiftLeft);
          continue;
        }
        if (!value || typeof value !== "object") continue;
        if (!Number.isFinite(value.start)) continue;
        value.start = Math.max(1, value.start - shiftLeft);
      }
      return migrated;
    }

    function runThirdChartLeftAlignMigration() {
      if (localStorage.getItem(thirdChartLeftAlignMigrationKey) === "1") return;
      const storageKeys = [
        `${posStorageBaseKey}_chunk`,
        `${posStorageBaseKey}_day`
      ];
      for (const key of storageKeys) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) continue;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") continue;
          const migrated = migrateThirdChartLeftState(parsed);
          localStorage.setItem(key, JSON.stringify(migrated));
        } catch {}
      }
      localStorage.setItem(thirdChartLeftAlignMigrationKey, "1");
    }

    function getPosStorageKey() {
      return `${posStorageBaseKey}_${currentScale}`;
    }

    function getCols() {
      return Number(getComputedStyle(document.documentElement).getPropertyValue("--cols"));
    }

    function getUnitPx() {
      return Number(getComputedStyle(document.documentElement).getPropertyValue("--unit").replace("px", ""));
    }

    function fitUnitToViewport() {
      const cols = getCols();
      if (!Number.isFinite(cols) || cols <= 0) return;
      const viewportWidth = scrollEl ? scrollEl.clientWidth : (window.innerWidth - 32);
      const unitByViewport = Math.floor((viewportWidth - 6) / cols);
      const minUnit = currentScale === "day" ? 18 : 26;
      const maxUnit = currentScale === "day" ? 30 : 42;
      const targetUnit = Math.max(minUnit, Math.min(maxUnit, unitByViewport));
      document.documentElement.style.setProperty("--unit", `${targetUnit}px`);
      const rowHeight = Math.max(42, Math.round(targetUnit * 1.55));
      const calHeight = Math.max(22, Math.round(targetUnit * 0.78));
      document.documentElement.style.setProperty("--row-h", `${rowHeight}px`);
      document.documentElement.style.setProperty("--cal-h", `${calHeight}px`);
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function getTodayLocal() {
      return startOfDay(new Date());
    }

    function getChartStartDate(groupIndex) {
      return addDays(baseStartDate, groupIndex * chartSpanDays);
    }

    function buildSegments(chartStartDate) {
      currentChartStartDate = new Date(chartStartDate);
      segments.length = 0;
      cumulativeDays.length = 0;
      let cursor = new Date(currentChartStartDate);
      let daySum = 0;
      for (let i = 0; i < segmentCount; i += 1) {
        const len = segmentDays;
        const start = new Date(cursor);
        const end = addDays(start, len - 1);
        segments.push({ start, end, len });
        daySum += len;
        cumulativeDays.push(daySum);
        cursor = addDays(end, 1);
      }
      totalDays = daySum;
    }

    function setCols(cols) {
      document.documentElement.style.setProperty("--cols", String(cols));
    }

    function chunkStartToDay(chunkStart) {
      if (chunkStart <= 1) return 1;
      return cumulativeDays[chunkStart - 2] + 1;
    }

    function chunkEndToDay(chunkStart, chunkSpan) {
      const endChunk = Math.min(segments.length, chunkStart + chunkSpan - 1);
      return cumulativeDays[endChunk - 1];
    }

    function dayToChunk(dayIndex) {
      for (let i = 0; i < cumulativeDays.length; i += 1) {
        if (dayIndex <= cumulativeDays[i]) return i + 1;
      }
      return segments.length;
    }

    function convertItemScale(item, fromScale, toScale) {
      if (fromScale === toScale) return;
      if (fromScale === "chunk" && toScale === "day") {
        const dayStart = chunkStartToDay(item.start);
        const dayEnd = chunkEndToDay(item.start, item.span);
        item.start = dayStart;
        item.span = Math.max(1, dayEnd - dayStart + 1);
        return;
      }

      const chunkStart = dayToChunk(item.start);
      const dayEnd = item.start + item.span - 1;
      const chunkEnd = dayToChunk(dayEnd);
      item.start = chunkStart;
      item.span = Math.max(1, chunkEnd - chunkStart + 1);
    }

    function buildCalendar() {
      monthTrack.innerHTML = "";
      chunkTrack.innerHTML = "";
      if (currentScale === "day") {
        buildDayCalendar();
      } else {
        buildChunkCalendar();
      }
    }

    function buildChunkCalendar() {
      setCols(segments.length);
      fitUnitToViewport();
      const monthNames = [
        "Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
        "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
      ];

      let i = 0;
      while (i < segments.length) {
        const m = segments[i].start.getMonth();
        const y = segments[i].start.getFullYear();
        let span = 1;
        while (i + span < segments.length) {
          const next = segments[i + span].start;
          if (next.getMonth() !== m || next.getFullYear() !== y) break;
          span += 1;
        }
        const cell = document.createElement("div");
        cell.className = "month-cell";
        cell.style.gridColumn = `${i + 1} / span ${span}`;
        cell.textContent = `${monthNames[m]} ${y}`;
        monthTrack.appendChild(cell);
        i += span;
      }

      segments.forEach((seg, idx) => {
        const cell = document.createElement("div");
        cell.className = `chunk-cell ${seg.len === 4 ? "long" : ""}`;
        cell.dataset.col = String(idx + 1);
        cell.textContent = seg.start.getDate();
        cell.title = `${seg.start.toLocaleDateString("ru-RU")} - ${seg.end.toLocaleDateString("ru-RU")} (${seg.len} дн.)`;
        cell.style.gridColumn = `${idx + 1} / span 1`;
        chunkTrack.appendChild(cell);
      });
    }

    function buildDayCalendar() {
      setCols(totalDays);
      fitUnitToViewport();
      const monthNames = [
        "Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
        "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
      ];

      let cursor = new Date(currentChartStartDate);
      let col = 1;
      while (col <= totalDays) {
        const m = cursor.getMonth();
        const y = cursor.getFullYear();
        let span = 0;
        while (col + span <= totalDays) {
          const d = addDays(cursor, span);
          if (d.getMonth() !== m || d.getFullYear() !== y) break;
          span += 1;
        }
        const cell = document.createElement("div");
        cell.className = "month-cell";
        cell.style.gridColumn = `${col} / span ${span}`;
        cell.textContent = `${monthNames[m]} ${y}`;
        monthTrack.appendChild(cell);
        cursor = addDays(cursor, span);
        col += span;
      }

      for (let i = 0; i < totalDays; i += 1) {
        const d = addDays(currentChartStartDate, i);
        const cell = document.createElement("div");
        cell.className = "chunk-cell";
        cell.dataset.col = String(i + 1);
        cell.textContent = d.getDate();
        cell.title = d.toLocaleDateString("ru-RU");
        cell.style.gridColumn = `${i + 1} / span 1`;
        chunkTrack.appendChild(cell);
      }
    }

    function getTodayColumn() {
      const today = getTodayLocal();
      if (currentScale === "day") {
        const chartStart = startOfDay(currentChartStartDate);
        const diffDays = Math.floor((today - chartStart) / (24 * 60 * 60 * 1000));
        const col = diffDays + 1;
        if (col < 1 || col > totalDays) return null;
        return col;
      }

      for (let i = 0; i < segments.length; i += 1) {
        const seg = segments[i];
        const segStart = startOfDay(seg.start);
        const segEnd = startOfDay(seg.end);
        if (today >= segStart && today <= segEnd) {
          return i + 1;
        }
      }
      return null;
    }

    function getCurrentTaskItem(todayCol) {
      if (!currentTaskIds.length) return null;
      const today = getTodayLocal();
      const chartStart = startOfDay(currentChartStartDate);
      const chartEnd = addDays(chartStart, totalDays - 1);

      if (today < chartStart) {
        return items[currentTaskIds[0]];
      }
      if (today > chartEnd) {
        return null;
      }

      for (const id of currentTaskIds) {
        const item = items[id];
        const end = item.start + item.span - 1;
        if (todayCol <= end) {
          return item;
        }
      }
      return null;
    }

    function highlightCalendarDates() {
      const cells = Array.from(chunkTrack.children);
      if (!cells.length) return;

      for (const cell of cells) {
        cell.classList.remove("today-marker", "remaining-marker");
      }

      const todayCol = getTodayColumn();
      if (todayCol !== null && cells[todayCol - 1]) {
        cells[todayCol - 1].classList.add("today-marker");
      }

      const currentItem = getCurrentTaskItem(todayCol);
      if (!currentItem) return;

      let remainingStart = currentItem.start;
      if (todayCol !== null) {
        remainingStart = Math.max(remainingStart, todayCol);
      }
      const remainingEnd = currentItem.start + currentItem.span - 1;

      for (let col = remainingStart; col <= remainingEnd; col += 1) {
        const cell = cells[col - 1];
        if (cell) {
          cell.classList.add("remaining-marker");
        }
      }
    }

    function getSpanLimits(scale = currentScale) {
      if (scale === "day") {
        return { min: DAY_MIN_SPAN, max: DAY_MAX_SPAN };
      }
      return { min: CHUNK_MIN_SPAN, max: CHUNK_MAX_SPAN };
    }

    function clampSpan(span, scale = currentScale) {
      const limits = getSpanLimits(scale);
      return Math.max(limits.min, Math.min(limits.max, span));
    }

    function clampItemToScale(item) {
      item.span = clampSpan(item.span);
      const maxStart = Math.max(1, getCols() - item.span + 1);
      item.start = Math.max(1, Math.min(maxStart, item.start));
    }

    function enforceSpanLimitsForCurrentScale() {
      for (const id of currentTaskIds) {
        clampItemToScale(items[id]);
      }
    }

    function getMainColor(groupIndex) {
      const palette = ["#8fd4ff", "#ff9cc6", "#ffd39a"];
      return palette[groupIndex % palette.length];
    }

    function getSubtaskColor(groupIndex, subtaskIndex) {
      const n = groupIndex * 100 + subtaskIndex;
      const hue = (n * 137 + 29) % 360;
      const sat = [72, 64, 58, 70, 62][n % 5];
      const light = [74, 78, 72, 76, 80][n % 5];
      return `hsl(${hue} ${sat}% ${light}%)`;
    }

    function subtaskPosition(idx, total) {
      const cols = getCols();
      const margin = 2;
      const usable = Math.max(1, cols - (margin * 2));
      const step = usable / Math.max(1, total - 1);
      const baseSpan = currentScale === "day" ? (2 + (idx % 3)) : 1;
      const span = clampSpan(baseSpan);
      let start = margin + Math.round(idx * step);
      const maxStart = Math.max(1, cols - span + 1);
      if (start > maxStart) start = maxStart;
      return { start, span };
    }

    function addRow({ labelId, labelTitle, isMain, barId, start, span, color, trackable }) {
      const row = document.createElement("div");
      row.className = "row";

      const lane = document.createElement("div");
      lane.className = "lane";

      const bar = document.createElement("div");
      bar.className = `bar ${isMain ? "main" : ""}`;
      bar.dataset.id = barId;
      bar.dataset.label = `${labelId} ${labelTitle}`;
      bar.dataset.trackable = trackable ? "1" : "0";
      bar.style.gridColumn = `${start} / span ${span}`;
      bar.style.background = color;
      bar.title = `${labelId}: ${labelTitle}`;
      bar.textContent = `${labelId} ${labelTitle}`;
      if (trackable) {
        const leftHandle = document.createElement("span");
        leftHandle.className = "bar-handle left";
        leftHandle.dataset.edge = "left";
        const rightHandle = document.createElement("span");
        rightHandle.className = "bar-handle right";
        rightHandle.dataset.edge = "right";
        bar.append(leftHandle, rightHandle);
      }

      lane.appendChild(bar);
      row.append(lane);
      rows.appendChild(row);
      return { bar };
    }

    function ensureList(map, key) {
      if (!map[key]) map[key] = [];
      return map[key];
    }

    function registerDependency(fromId, toId) {
      dependencyPairs.push([fromId, toId]);
      ensureList(adjacency, fromId).push(toId);
      ensureList(reverseAdjacency, toId).push(fromId);
    }

    function normalizeFromDependencies() {
      for (const [fromId, toId] of dependencyPairs) {
        const from = items[fromId];
        const to = items[toId];
        const minStart = from.start + 1;
        if (to.start < minStart) to.start = minStart;
      }
    }

    function collectCascadeIds(sourceId) {
      const order = [];
      const seen = new Set();
      const stack = [sourceId];
      while (stack.length > 0) {
        const id = stack.pop();
        if (seen.has(id)) continue;
        seen.add(id);
        order.push(id);
        const deps = adjacency[id] || [];
        for (let i = deps.length - 1; i >= 0; i -= 1) {
          stack.push(deps[i]);
        }
      }
      return order;
    }

    function collectPredecessorIds(sourceId) {
      const order = [];
      const seen = new Set();
      const stack = [...(reverseAdjacency[sourceId] || [])];
      while (stack.length > 0) {
        const id = stack.pop();
        if (seen.has(id)) continue;
        seen.add(id);
        order.push(id);
        const preds = reverseAdjacency[id] || [];
        for (let i = preds.length - 1; i >= 0; i -= 1) {
          stack.push(preds[i]);
        }
      }
      return order;
    }

    function collectRightShiftIds(sourceId) {
      // For right-resize, shift every task below the current one (visual order).
      const sourceIndex = currentTaskIds.indexOf(sourceId);
      if (sourceIndex < 0) return [];
      return currentTaskIds.slice(sourceIndex + 1);
    }

    function getDeltaBounds(cascadeIds) {
      const cols = getCols();
      const inCascade = new Set(cascadeIds);
      let minDelta = -Infinity;
      let maxDelta = Infinity;

      for (const id of cascadeIds) {
        const item = items[id];
        minDelta = Math.max(minDelta, 1 - item.start);
        maxDelta = Math.min(maxDelta, (cols - item.span + 1) - item.start);

        const preds = reverseAdjacency[id] || [];
        for (const predId of preds) {
          if (inCascade.has(predId)) continue;
          const pred = items[predId];
          const minFromPred = pred.start + 1;
          minDelta = Math.max(minDelta, minFromPred - item.start);
        }
      }

      if (!Number.isFinite(minDelta)) minDelta = 0;
      if (!Number.isFinite(maxDelta)) maxDelta = 0;
      if (minDelta > maxDelta) {
        minDelta = 0;
        maxDelta = 0;
      }
      return { minDelta, maxDelta };
    }

    function applyCascadeDelta(cascadeIds, baseStarts, delta) {
      for (const id of cascadeIds) {
        items[id].start = baseStarts[id] + delta;
      }
      normalizeFromDependencies();
    }

    function getResizeBoundsRight(item, rightShiftIds, baseStarts) {
      const cols = getCols();
      const limits = getSpanLimits();
      let minDelta = limits.min - item.span;
      // No hard max-length cap: stop only when the rightmost shifted bar reaches the timeline end.
      let maxDelta = (cols - item.start + 1) - item.span;
      for (const moveId of rightShiftIds) {
        const moved = items[moveId];
        const movedStart = baseStarts[moveId];
        minDelta = Math.max(minDelta, 1 - movedStart);
        maxDelta = Math.min(maxDelta, (cols - moved.span + 1) - movedStart);
      }
      if (minDelta > maxDelta) {
        minDelta = 0;
        maxDelta = 0;
      }
      return { minDelta, maxDelta };
    }

    function getResizeBoundsLeft(item, predecessors, baseStarts) {
      const limits = getSpanLimits();
      let minDelta = 1 - item.start;
      minDelta = Math.max(minDelta, item.span - limits.max);
      let maxDelta = item.span - limits.min;
      for (const predId of predecessors) {
        const predStart = baseStarts[predId];
        minDelta = Math.max(minDelta, 1 - predStart);
      }
      if (minDelta > maxDelta) {
        minDelta = 0;
        maxDelta = 0;
      }
      return { minDelta, maxDelta };
    }

    function applyRightResize(itemId, baseStarts, baseSpan, rightShiftIds, delta) {
      const item = items[itemId];
      item.span = clampSpan(baseSpan + delta);
      for (const moveId of rightShiftIds) {
        items[moveId].start = baseStarts[moveId] + delta;
      }
      normalizeFromDependencies();
    }

    function applyLeftResize(itemId, baseStarts, baseSpan, predecessors, delta) {
      const item = items[itemId];
      item.start = baseStarts[itemId] + delta;
      item.span = clampSpan(baseSpan - delta);
      for (const predId of predecessors) {
        const base = baseStarts[predId];
        items[predId].start = delta < 0 ? base + delta : base;
      }
      normalizeFromDependencies();
    }

    function updateMainBar() {
      if (!mainBar) return;
      const cols = getCols();
      mainBar.style.gridColumn = `1 / span ${cols}`;
    }

    function renderBarPositions() {
      for (const id of currentTaskIds) {
        const item = items[id];
        item.bar.style.gridColumn = `${item.start} / span ${item.span}`;
      }
      updateMainBar();
      highlightCalendarDates();
    }

    function drawDependencies() {
      const cols = getCols();
      const laneWidth = cols * getUnitPx();
      const rowsHeight = rows.scrollHeight;
      links.setAttribute("viewBox", `0 0 ${laneWidth} ${rowsHeight}`);
      links.setAttribute("width", `${laneWidth}`);
      links.setAttribute("height", `${rowsHeight}`);
      links.innerHTML = `
        <defs>
          <marker id="depArrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
            <path d="M0,0 L7,3.5 L0,7 Z" fill="context-stroke"></path>
          </marker>
        </defs>
      `;

      const rowsRect = rows.getBoundingClientRect();
      for (const [fromId, toId] of dependencyPairs) {
        const from = items[fromId];
        const to = items[toId];
        const fromRect = from.bar.getBoundingClientRect();
        const toRect = to.bar.getBoundingClientRect();
        const x1 = fromRect.right - rowsRect.left;
        const y1 = fromRect.top - rowsRect.top + fromRect.height / 2;
        const x2 = toRect.left - rowsRect.left;
        const y2 = toRect.top - rowsRect.top + toRect.height / 2;
        const turnX = Math.max(x1 + 8, Math.min(x2 - 6, x1 + 14));

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "dep-link");
        path.setAttribute("stroke", from.color);
        path.setAttribute("marker-end", "url(#depArrow)");
        path.setAttribute("d", `M ${x1} ${y1} H ${turnX} V ${y2} H ${x2}`);
        links.appendChild(path);
      }
    }

    function setupResizeFor(item) {
      const { bar, id } = item;
      const handles = bar.querySelectorAll(".bar-handle");
      handles.forEach((handle) => {
        handle.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
          if (event.button !== 0) return;
          const edge = handle.dataset.edge;
          if (edge === "right") {
            ensureRightResizeHeadroom(id, 14);
            renderBarPositions();
            drawDependencies();
          }
          const baseStarts = {};
          for (const taskId of currentTaskIds) {
            baseStarts[taskId] = items[taskId].start;
          }
          baseStarts[id] = items[id].start;
          const baseSpan = items[id].span;
          const rightShiftIds = collectRightShiftIds(id);
          const predecessors = collectPredecessorIds(id);

          const bounds = edge === "right"
            ? getResizeBoundsRight(items[id], rightShiftIds, baseStarts)
            : getResizeBoundsLeft(items[id], predecessors, baseStarts);

          resizeState.active = true;
          resizeState.id = id;
          resizeState.pointerId = event.pointerId;
          resizeState.edge = edge;
          resizeState.startX = event.clientX;
          resizeState.minDelta = bounds.minDelta;
          resizeState.maxDelta = bounds.maxDelta;
          resizeState.moved = false;
          resizeState.baseStarts = baseStarts;
          resizeState.baseSpan = baseSpan;
          resizeState.predecessors = predecessors;
          resizeState.descendants = rightShiftIds;

          bar.classList.add("dragging");
          handle.setPointerCapture(event.pointerId);
        });

        handle.addEventListener("pointermove", (event) => {
          if (!resizeState.active || resizeState.id !== id) return;
          let delta = Math.round((event.clientX - resizeState.startX) / getUnitPx());
          delta = Math.max(resizeState.minDelta, Math.min(resizeState.maxDelta, delta));
          if (delta === 0 && !resizeState.moved) return;
          resizeState.moved = resizeState.moved || delta !== 0;

          if (resizeState.edge === "right") {
            applyRightResize(id, resizeState.baseStarts, resizeState.baseSpan, resizeState.descendants, delta);
          } else {
            applyLeftResize(id, resizeState.baseStarts, resizeState.baseSpan, resizeState.predecessors, delta);
          }
          ensureForwardSlack();
          renderBarPositions();
          drawDependencies();
        });

        const finishResize = () => {
          if (!resizeState.active || resizeState.id !== id) return;
          bar.classList.remove("dragging");
          try {
            handle.releasePointerCapture(resizeState.pointerId);
          } catch {}

          const moved = resizeState.moved;
          resizeState.active = false;
          resizeState.id = null;
          resizeState.pointerId = null;
          resizeState.edge = null;
          resizeState.baseStarts = {};
          resizeState.predecessors = [];
          resizeState.descendants = [];
          resizeState.baseSpan = 0;

          if (moved) {
            savePositions();
          }
        };

        handle.addEventListener("pointerup", finishResize);
        handle.addEventListener("pointercancel", finishResize);
      });
    }

    function setupDragFor(item) {
      const { bar, id } = item;
      bar.addEventListener("pointerdown", (event) => {
        if (resizeState.active) return;
        if (event.target.classList.contains("bar-handle")) return;
        if (event.button !== 0) return;
        const cascadeIds = collectCascadeIds(id);
        const bounds = getDeltaBounds(cascadeIds);
        const baseStarts = {};
        for (const cascadeId of cascadeIds) {
          baseStarts[cascadeId] = items[cascadeId].start;
        }

        dragState.active = true;
        dragState.id = id;
        dragState.pointerId = event.pointerId;
        dragState.startX = event.clientX;
        dragState.originStart = item.start;
        dragState.minDelta = bounds.minDelta;
        dragState.maxDelta = bounds.maxDelta;
        dragState.cascadeIds = cascadeIds;
        dragState.baseStarts = baseStarts;
        dragState.moved = false;
        bar.classList.add("dragging");
        bar.setPointerCapture(event.pointerId);
      });

      bar.addEventListener("pointermove", (event) => {
        if (!dragState.active || dragState.id !== id) return;
        let delta = Math.round((event.clientX - dragState.startX) / getUnitPx());
        delta = Math.max(dragState.minDelta, Math.min(dragState.maxDelta, delta));
        if ((dragState.baseStarts[id] + delta) === item.start) return;
        dragState.moved = dragState.moved || delta !== 0;
        applyCascadeDelta(dragState.cascadeIds, dragState.baseStarts, delta);
        renderBarPositions();
        drawDependencies();
      });

      const finish = () => {
        if (!dragState.active || dragState.id !== id) return;
        bar.classList.remove("dragging");
        try {
          bar.releasePointerCapture(dragState.pointerId);
        } catch {}

        const moved = dragState.moved;
        dragState.active = false;
        dragState.id = null;
        dragState.cascadeIds = [];
        dragState.baseStarts = {};

        if (moved) {
          savePositions();
        } else {
          openNoteEditor(id, bar.dataset.label || id);
        }
      };

      bar.addEventListener("pointerup", finish);
      bar.addEventListener("pointercancel", finish);
    }

    function readNotesState() {
      try {
        const state = JSON.parse(localStorage.getItem(notesStorageKey) || "{}");
        return state && typeof state === "object" ? state : {};
      } catch {
        return {};
      }
    }

    function writeNotesState(state) {
      localStorage.setItem(notesStorageKey, JSON.stringify(state));
    }

    function readPositions() {
      try {
        const state = JSON.parse(localStorage.getItem(getPosStorageKey()) || "{}");
        return state && typeof state === "object" ? state : {};
      } catch {
        return {};
      }
    }

    function savePositions() {
      const saved = readPositions();
      for (const id of currentTaskIds) {
        saved[id] = {
          start: items[id].start,
          span: items[id].span
        };
      }
      localStorage.setItem(getPosStorageKey(), JSON.stringify(saved));
    }

    function getNoteById(id) {
      const notes = readNotesState();
      const text = notes[id];
      return typeof text === "string" ? text : "";
    }

    function saveNoteById(id, text) {
      const notes = readNotesState();
      const normalized = (text || "").trim();
      if (normalized.length === 0) {
        delete notes[id];
      } else {
        notes[id] = normalized;
      }
      writeNotesState(notes);
    }

    function closeNoteEditor() {
      activeNoteId = null;
      activeNoteLabel = "";
      if (!noteModal) return;
      noteModal.classList.remove("open");
      noteModal.setAttribute("aria-hidden", "true");
    }

    function openNoteEditor(id, label) {
      if (!noteModal || !noteInput || !noteModalTitle) return;
      activeNoteId = id;
      activeNoteLabel = label || id;
      noteModalTitle.textContent = `Заметка: ${activeNoteLabel}`;
      noteInput.value = getNoteById(id);
      noteModal.classList.add("open");
      noteModal.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => {
        noteInput.focus();
        noteInput.setSelectionRange(noteInput.value.length, noteInput.value.length);
      });
    }

    function resetRuntime() {
      items = {};
      mainBar = null;
      currentTaskIds = [];
      dependencyPairs = [];
      adjacency = {};
      reverseAdjacency = {};
      rows.innerHTML = "";
      rows.appendChild(links);
    }

    function restorePositions() {
      const saved = readPositions();
      for (const id of currentTaskIds) {
        const entry = saved[id];
        if (!entry) continue;
        const item = items[id];
        const rawStart = typeof entry === "object" ? entry.start : entry;
        const rawSpan = typeof entry === "object" ? entry.span : undefined;
        if (Number.isFinite(rawSpan)) {
          item.span = clampSpan(rawSpan);
        }
        if (Number.isFinite(rawStart)) {
          const maxStart = getCols() - item.span + 1;
          item.start = Math.max(1, Math.min(maxStart, rawStart));
        }
      }
      enforceSpanLimitsForCurrentScale();
      normalizeFromDependencies();
      ensureForwardSlack();
      renderBarPositions();
    }

    function ensureForwardSlack() {
      const cols = getCols();
      let rightmost = 0;
      for (const id of currentTaskIds) {
        const item = items[id];
        rightmost = Math.max(rightmost, item.start + item.span - 1);
      }

      // Shift only left if tasks overflow, do not auto-push tasks right.
      const desiredRightmost = cols - 2;
      const shiftLeft = Math.max(0, rightmost - desiredRightmost);
      if (shiftLeft === 0) return;

      for (const id of currentTaskIds) {
        items[id].start = Math.max(1, items[id].start - shiftLeft);
      }
      normalizeFromDependencies();
    }

    function ensureRightResizeHeadroom(sourceId, minFreeCols = 14) {
      const cols = getCols();
      const rightShiftIds = collectRightShiftIds(sourceId);
      const moveIds = [sourceId, ...rightShiftIds];
      if (moveIds.length === 0) return;

      let rightmost = 0;
      for (const id of moveIds) {
        const item = items[id];
        rightmost = Math.max(rightmost, item.start + item.span - 1);
      }

      const freeRight = Math.max(0, cols - rightmost);
      const need = Math.max(0, minFreeCols - freeRight);
      if (need === 0) return;

      const bounds = getDeltaBounds(moveIds);
      const maxShiftLeft = Math.max(0, -bounds.minDelta);
      const shiftLeft = Math.min(need, maxShiftLeft);
      if (shiftLeft === 0) return;

      const baseMoveStarts = {};
      for (const id of moveIds) {
        baseMoveStarts[id] = items[id].start;
      }
      applyCascadeDelta(moveIds, baseMoveStarts, -shiftLeft);
    }

    function updatePagerUI() {
      pagerLabel.textContent = `Чарт ${currentGroupIndex + 1} / ${groups.length}`;
      prevBtn.disabled = currentGroupIndex === 0;
      nextBtn.disabled = currentGroupIndex === groups.length - 1;
      localStorage.setItem(pageStorageKey, String(currentGroupIndex));
    }

    function updateZoomUI() {
      const isDay = currentScale === "day";
      zoomLabel.textContent = isDay ? "Шаг 1 день" : "Шаг 3 дня";
      zoomInBtn.disabled = isDay;
      zoomOutBtn.disabled = !isDay;
      localStorage.setItem(scaleStorageKey, currentScale);
    }

    function switchScale(targetScale) {
      if (targetScale === currentScale) return;
      const fromScale = currentScale;
      currentScale = targetScale;

      for (const id of currentTaskIds) {
        convertItemScale(items[id], fromScale, currentScale);
      }

      buildCalendar();
      enforceSpanLimitsForCurrentScale();
      normalizeFromDependencies();
      ensureForwardSlack();
      renderBarPositions();
      drawDependencies();
      savePositions();
      updateZoomUI();
    }

    function setupCornerPanelDrag() {
      if (!cornerPanel) return;

      cornerPanel.addEventListener("pointerdown", (event) => {
        if (event.button !== 0) return;
        if (event.target.closest("button")) return;

        const rect = cornerPanel.getBoundingClientRect();
        panelDragState.active = true;
        panelDragState.pointerId = event.pointerId;
        panelDragState.startX = event.clientX;
        panelDragState.startY = event.clientY;
        panelDragState.originLeft = rect.left;
        panelDragState.originTop = rect.top;

        cornerPanel.style.right = "auto";
        cornerPanel.style.left = `${rect.left}px`;
        cornerPanel.style.top = `${rect.top}px`;
        cornerPanel.classList.add("dragging");
        cornerPanel.setPointerCapture(event.pointerId);
      });

      cornerPanel.addEventListener("pointermove", (event) => {
        if (!panelDragState.active || panelDragState.pointerId !== event.pointerId) return;
        const dx = event.clientX - panelDragState.startX;
        const dy = event.clientY - panelDragState.startY;
        const maxLeft = Math.max(0, window.innerWidth - cornerPanel.offsetWidth);
        const maxTop = Math.max(0, window.innerHeight - cornerPanel.offsetHeight);
        const nextLeft = Math.max(0, Math.min(maxLeft, panelDragState.originLeft + dx));
        const nextTop = Math.max(0, Math.min(maxTop, panelDragState.originTop + dy));
        cornerPanel.style.left = `${nextLeft}px`;
        cornerPanel.style.top = `${nextTop}px`;
      });

      const stopDrag = (event) => {
        if (!panelDragState.active || panelDragState.pointerId !== event.pointerId) return;
        panelDragState.active = false;
        panelDragState.pointerId = null;
        cornerPanel.classList.remove("dragging");
        try {
          cornerPanel.releasePointerCapture(event.pointerId);
        } catch {}
      };

      cornerPanel.addEventListener("pointerup", stopDrag);
      cornerPanel.addEventListener("pointercancel", stopDrag);
    }

    function renderGroup(groupIndex) {
      currentGroupIndex = groupIndex;
      buildSegments(getChartStartDate(groupIndex));
      buildCalendar();
      resetRuntime();
      const group = groups[groupIndex];
      const mainColor = getMainColor(groupIndex);
      const mainRefs = addRow({
        labelId: group.id,
        labelTitle: group.title,
        isMain: true,
        barId: group.id,
        start: 4,
        span: 120,
        color: mainColor,
        trackable: false
      });
      mainBar = mainRefs.bar;

      group.subtasks.forEach((name, idx) => {
        const subId = `${group.id}.${String(idx + 1).padStart(2, "0")}`;
        const pos = subtaskPosition(idx, group.subtasks.length);
        const color = getSubtaskColor(groupIndex, idx);
        const refs = addRow({
          labelId: subId,
          labelTitle: name,
          isMain: false,
          barId: subId,
          start: pos.start,
          span: pos.span,
          color,
          trackable: true
        });
        items[subId] = {
          id: subId,
          start: pos.start,
          span: pos.span,
          color,
          bar: refs.bar
        };
        if (currentScale === "day") {
          convertItemScale(items[subId], "chunk", "day");
        }
        clampItemToScale(items[subId]);
        currentTaskIds.push(subId);
      });

      for (let i = 1; i < currentTaskIds.length; i += 1) {
        registerDependency(currentTaskIds[i - 1], currentTaskIds[i]);
      }

      for (const id of currentTaskIds) {
        setupDragFor(items[id]);
        setupResizeFor(items[id]);
      }

      restorePositions();
      drawDependencies();
      mainBar.addEventListener("click", () => {
        openNoteEditor(group.id, mainBar.dataset.label || group.title);
      });
      if (scrollEl) {
        scrollEl.scrollLeft = 0;
      }
      updatePagerUI();
    }

    prevBtn.addEventListener("click", () => {
      if (currentGroupIndex > 0) {
        renderGroup(currentGroupIndex - 1);
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentGroupIndex < groups.length - 1) {
        renderGroup(currentGroupIndex + 1);
      }
    });

    zoomInBtn.addEventListener("click", () => {
      switchScale("day");
    });

    zoomOutBtn.addEventListener("click", () => {
      switchScale("chunk");
    });

    if (clearBtn) {
      clearBtn.addEventListener("click", () => {
        localStorage.removeItem(`${posStorageBaseKey}_chunk`);
        localStorage.removeItem(`${posStorageBaseKey}_day`);
        localStorage.removeItem(notesStorageKey);
      });
    }

    if (noteCancelBtn) {
      noteCancelBtn.addEventListener("click", closeNoteEditor);
    }

    if (noteSaveBtn) {
      noteSaveBtn.addEventListener("click", () => {
        if (!activeNoteId) {
          closeNoteEditor();
          return;
        }
        saveNoteById(activeNoteId, noteInput ? noteInput.value : "");
        closeNoteEditor();
      });
    }

    if (noteModal) {
      noteModal.addEventListener("click", (event) => {
        if (event.target === noteModal) {
          closeNoteEditor();
        }
      });
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && noteModal && noteModal.classList.contains("open")) {
        closeNoteEditor();
      }
    });

    runFirstGroupInsertMigration();
    runSpanHalvingMigration();
    runThirdChartLeftAlignMigration();
    const savedScale = localStorage.getItem(scaleStorageKey);
    if (savedScale === "day" || savedScale === "chunk") {
      currentScale = savedScale;
    }
    const savedPage = Number(localStorage.getItem(pageStorageKey));
    if (Number.isInteger(savedPage) && savedPage >= 0 && savedPage < groups.length) {
      currentGroupIndex = savedPage;
    }
    updateZoomUI();
    setupCornerPanelDrag();
    renderGroup(currentGroupIndex);

    window.addEventListener("resize", () => {
      fitUnitToViewport();
      renderBarPositions();
      drawDependencies();
    });
  </script>
</body>
</html>
